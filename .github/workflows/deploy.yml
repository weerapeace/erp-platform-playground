name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # ไม่ใช้ npm cache เพราะยังไม่มี package-lock.json
          # (จะ regenerate ตอน first successful build)

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (OpenNext)
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://cyivhkecxeoonlowcvaz.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx @opennextjs/cloudflare@latest build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:        ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:       ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.95.0"
          command:         deploy
          # secrets ที่จะส่งเข้า Worker runtime (ผ่าน `wrangler secret put` ก่อน deploy)
          secrets: |
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            R2_ACCOUNT_ID
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
        env:
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID:                  ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:               ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:           ${{ secrets.R2_SECRET_ACCESS_KEY }}
